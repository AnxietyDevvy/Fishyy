<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cozy Pixel Fishing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-layer bg-layer-1"></div>
    <div class="bg-layer bg-layer-2"></div>

    <main class="app" id="app">
      <header class="topbar card">
        <div class="title-wrap">
          <h1>Cozy Pixel Fishing</h1>
          <p id="timeSeason">Dawn • Spring</p>
        </div>
        <div class="stats">
          <div class="stat-pill"><span>Coins</span><strong id="coins">0</strong></div>
          <div class="stat-pill"><span>Region</span><strong id="regionName">-</strong></div>
          <div class="stat-pill"><span>Rod</span><strong id="rodName">-</strong></div>
        </div>
      </header>

      <section class="layout">
        <section class="left-col card pond-card">
          <div class="tab-bar" role="tablist" aria-label="Game sections">
            <button class="tab-button active" data-tab="npc">NPC</button>
            <button class="tab-button" data-tab="gear">Gear</button>
            <button class="tab-button" data-tab="inventory">Inventory</button>
            <button class="tab-button" data-tab="shop">Shop</button>
            <button class="tab-button" data-tab="routes">Routes</button>
          </div>

          <div class="pond-shell">
            <canvas id="pondCanvas" width="520" height="280" aria-label="Fishing pond scene"></canvas>
          </div>

          <div class="action-row">
            <button id="fishBtn" class="btn primary">Cast Line</button>
            <button id="soundBtn" class="btn ghost">Sound: On</button>
          </div>
          <div id="celebrationOverlay" class="celebration-overlay" aria-live="polite"></div>
          <p id="catchLog" class="catch-log">Welcome! Cast your line to begin.</p>

          <div class="tab-content">
            <div class="tab-panel active" data-panel="npc">
              <div class="panel-card">
                <div class="panel-head">
                  <h2>Villager</h2>
                  <button id="refreshQuestBtn" class="btn tiny">New Request</button>
                </div>
                <div id="questContent" class="quest-content"></div>
              </div>
            </div>

            <div class="tab-panel" data-panel="gear">
              <div class="panel-card">
                <div class="panel-head">
                  <h2>Gear</h2>
                  <span class="chip">Cabin Kit</span>
                </div>
                <div id="gearContent" class="gear-stack"></div>
              </div>
            </div>

            <div class="tab-panel" data-panel="inventory">
              <div class="panel-card">
                <div class="panel-head">
                  <h2>Inventory</h2>
                  <span class="chip">Basket</span>
                </div>
                <ul id="inventoryList" class="list"></ul>
                <div class="panel-actions">
                  <button id="sellOneBtn" class="btn">Sell 1</button>
                  <button id="sellAllBtn" class="btn">Sell All</button>
                </div>
              </div>
            </div>

            <div class="tab-panel" data-panel="shop">
              <div class="panel-card">
                <div class="panel-head">
                  <h2>Shop</h2>
                  <span class="chip">Tips</span>
                </div>
                <div id="shopContent" class="shop-stack"></div>
              </div>
            </div>

            <div class="tab-panel" data-panel="routes">
              <div class="panel-card">
                <div class="panel-head">
                  <h2>Routes</h2>
                  <span class="chip">Travel</span>
                </div>
                <div id="routesContent" class="region-items"></div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
